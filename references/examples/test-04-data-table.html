<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=Literata:ital,opsz,wght@0,7..72,300;0,7..72,400;0,7..72,600;0,7..72,700;1,7..72,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════════
   PDF Report Design System — v2.0
   A refined, print-first design system for professional documents.
   
   Inspired by: Deloitte, McKinsey, and Anthropic report design.
   Fonts: Instrument Serif (display), Literata (body), Instrument Sans (UI)
   Default theme: Warm Earth
   ═══════════════════════════════════════════════════════════════ */

/* ── Theme: Warm Earth (default) ─────────────────────────────── */
:root {
  /* Primary palette — warm, natural, grounded */
  --ink:        #2C2420;     /* Darkest — headings, hero backgrounds */
  --espresso:   #3E3530;     /* Dark text for emphasis */
  --body-color: #4A4340;     /* Body text — warm near-black */
  --stone:      #6B6260;     /* Secondary text, captions */
  --clay:       #8C7E7A;     /* Muted text, metadata, sources */

  /* Accent palette */
  --terra:      #B85C38;     /* Primary accent — warm terracotta */
  --copper:     #C97B4B;     /* Secondary accent — warm copper */
  --sage:       #6B7F5E;     /* Tertiary accent — muted sage green */
  --sand:       #D4B896;     /* Highlight accent — warm sand/wheat */
  --ochre:      #C4933E;     /* Quaternary accent — golden ochre */

  /* Surfaces */
  --surface:    #FAF7F4;     /* Page background — warm white */
  --paper:      #FFFFFF;     /* Card/exhibit/table background */
  --wash:       #F3EDE7;     /* Light background sections */
  --border:     #E5DDD5;     /* Borders, dividers, rules */

  /* Semantic heat-map tints */
  --heat-high:  rgba(184, 92, 56, 0.12);
  --heat-med:   rgba(184, 92, 56, 0.06);
  --heat-low:   rgba(201, 123, 75, 0.04);

  /* Typography stacks */
  --display:    'Instrument Serif', Georgia, 'Times New Roman', serif;
  --text:       'Literata', Georgia, serif;
  --sans:       'Instrument Sans', 'Helvetica Neue', Arial, sans-serif;
  --mono:       'JetBrains Mono', 'Consolas', 'Courier New', monospace;

  /* Spacing scale — 4px base */
  --sp-1: 4px;   --sp-2: 8px;   --sp-3: 12px;  --sp-4: 16px;
  --sp-5: 20px;  --sp-6: 24px;  --sp-8: 32px;  --sp-10: 40px;
  --sp-12: 48px; --sp-16: 64px; --sp-20: 80px; --sp-24: 96px;

  /* Layout */
  --content-width: 960px;
  --gutter: 40px;
}

/* ── Reset ──────────────────────────────────────────────────── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

/* ── Base typography ────────────────────────────────────────── */
html { scroll-behavior: smooth; }
body {
  font-family: var(--text);
  font-size: 16px;
  line-height: 1.72;
  color: var(--body-color);
  background: var(--surface);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-feature-settings: 'kern' 1, 'liga' 1;
}

/* ── Layout container ───────────────────────────────────────── */
.container {
  max-width: var(--content-width);
  margin: 0 auto;
  padding: 0 var(--gutter);
}
section { padding: var(--sp-20) 0; }
section.tight { padding: var(--sp-12) 0; }
section.flush { padding: 0; }

/* ══════════════════════════════════════════════════════════════
   FULL-BLEED COVER — edge-to-edge hero with image
   ══════════════════════════════════════════════════════════════ */
.cover-full {
  position: relative;
  width: 100%;
  min-height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  color: #fff;
}
.cover-full img.cover-bg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: 0;
}
.cover-full .cover-overlay {
  position: absolute;
  inset: 0;
  z-index: 1;
  /* Default: dark gradient from bottom for text legibility */
  background: linear-gradient(
    to top,
    rgba(44,36,32,0.85) 0%,
    rgba(44,36,32,0.4) 40%,
    rgba(44,36,32,0.1) 70%,
    transparent 100%
  );
}
.cover-full .cover-content {
  position: relative;
  z-index: 2;
  padding: var(--sp-16) var(--gutter) var(--sp-12);
  max-width: var(--content-width);
  margin: 0 auto;
  width: 100%;
}
.cover-full .cover-kicker {
  font-family: var(--sans);
  font-size: 11px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--sand);
  font-weight: 500;
  margin-bottom: var(--sp-6);
}
.cover-full h1 {
  font-family: var(--display);
  font-size: clamp(42px, 6vw, 68px);
  font-weight: 400;
  line-height: 1.05;
  margin-bottom: var(--sp-6);
  max-width: 700px;
  letter-spacing: -0.5px;
}
.cover-full h1 em {
  font-style: italic;
  color: var(--sand);
}
.cover-full .cover-rule {
  width: 48px;
  height: 2px;
  background: var(--terra);
  border: none;
  margin: var(--sp-6) 0;
}
.cover-full .cover-sub {
  font-family: var(--text);
  font-size: 18px;
  line-height: 1.6;
  color: rgba(255,255,255,0.65);
  max-width: 500px;
  font-weight: 300;
  margin-bottom: var(--sp-8);
}
.cover-full .cover-meta {
  display: flex;
  gap: var(--sp-8);
  flex-wrap: wrap;
  font-family: var(--sans);
  font-size: 12px;
  color: rgba(255,255,255,0.35);
}
.cover-full .cover-meta strong {
  color: rgba(255,255,255,0.7);
  font-weight: 600;
}

/* ══════════════════════════════════════════════════════════════
   SECTION HERO — full-width image break between sections
   ══════════════════════════════════════════════════════════════ */
.section-hero {
  position: relative;
  width: 100%;
  height: 360px;
  overflow: hidden;
}
.section-hero img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.section-hero .section-hero-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to right,
    rgba(44,36,32,0.7) 0%,
    rgba(44,36,32,0.2) 60%,
    transparent 100%
  );
  display: flex;
  align-items: center;
  padding: 0 var(--gutter);
}
.section-hero .section-hero-text {
  max-width: var(--content-width);
  margin: 0 auto;
  width: 100%;
}
.section-hero .section-hero-text .section-label {
  color: var(--sand);
}
.section-hero .section-hero-text .section-title {
  color: #fff;
  font-size: clamp(28px, 3.5vw, 42px);
}

/* ══════════════════════════════════════════════════════════════
   TOP BAR — thin persistent header strip
   ══════════════════════════════════════════════════════════════ */
.top-bar {
  background: var(--ink);
  color: rgba(255,255,255,0.8);
  padding: var(--sp-3) 0;
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 2px;
  text-transform: uppercase;
  text-align: center;
  position: relative; /* relative for PDF, not sticky */
}
.top-bar .sep {
  opacity: 0.3;
  margin: 0 var(--sp-3);
}

/* ══════════════════════════════════════════════════════════════
   HERO — cover/title section
   ══════════════════════════════════════════════════════════════ */
.hero {
  background: var(--ink);
  color: #fff;
  padding: var(--sp-24) 0 var(--sp-20);
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 70% 20%, rgba(184,92,56,0.07) 0%, transparent 55%),
    radial-gradient(ellipse at 30% 80%, rgba(212,184,150,0.04) 0%, transparent 50%);
  pointer-events: none;
}
.hero-inner {
  max-width: var(--content-width);
  margin: 0 auto;
  padding: 0 var(--gutter);
  position: relative;
  z-index: 1;
}
.hero-kicker {
  font-family: var(--sans);
  font-size: 11px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--sand);
  margin-bottom: var(--sp-8);
  font-weight: 500;
}
.hero h1 {
  font-family: var(--display);
  font-size: clamp(38px, 5vw, 58px);
  font-weight: 400; /* Instrument Serif looks best at regular weight */
  line-height: 1.1;
  margin-bottom: var(--sp-6);
  max-width: 780px;
  letter-spacing: -0.5px;
}
.hero h1 em {
  font-style: italic;
  color: var(--sand);
}
.hero-rule {
  width: 48px;
  height: 2px;
  background: var(--terra);
  border: none;
  margin: var(--sp-8) 0;
}
.hero-sub {
  font-family: var(--text);
  font-size: 18px;
  line-height: 1.65;
  color: rgba(255,255,255,0.6);
  max-width: 540px;
  font-weight: 300;
}
.hero-details {
  margin-top: var(--sp-12);
  display: flex;
  gap: var(--sp-10);
  flex-wrap: wrap;
  font-family: var(--sans);
  font-size: 12px;
  color: rgba(255,255,255,0.35);
  letter-spacing: 0.3px;
}
.hero-details strong {
  color: rgba(255,255,255,0.7);
  font-weight: 600;
}

/* ══════════════════════════════════════════════════════════════
   EXECUTIVE SUMMARY
   ══════════════════════════════════════════════════════════════ */
.exec-summary {
  background: var(--paper);
  border-top: 3px solid var(--terra);
  padding: var(--sp-20) 0;
}
.exec-summary .lead {
  font-size: 20px;
  line-height: 1.72;
  color: var(--espresso);
  font-weight: 300;
  max-width: 700px;
  margin-bottom: var(--sp-8);
}
.exec-summary .lead strong {
  font-weight: 600;
  color: var(--ink);
}
.exec-summary p {
  font-size: 15.5px;
  line-height: 1.78;
  max-width: 700px;
  margin-bottom: var(--sp-5);
}
.drop-cap::first-letter {
  font-family: var(--display);
  float: left;
  font-size: 60px;
  line-height: 0.78;
  margin: 5px 10px 0 0;
  color: var(--ink);
  font-weight: 400;
}

/* ══════════════════════════════════════════════════════════════
   SECTION HEADINGS
   ══════════════════════════════════════════════════════════════ */
.section-label {
  font-family: var(--sans);
  font-size: 11px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--terra);
  font-weight: 600;
  margin-bottom: var(--sp-3);
}
.section-title {
  font-family: var(--display);
  font-size: clamp(26px, 3vw, 36px);
  font-weight: 400;
  color: var(--ink);
  line-height: 1.18;
  margin-bottom: var(--sp-5);
  letter-spacing: -0.3px;
}
.section-intro {
  font-size: 17px;
  line-height: 1.78;
  color: var(--body-color);
  max-width: 620px;
  margin-bottom: var(--sp-12);
  font-weight: 300;
}

/* ══════════════════════════════════════════════════════════════
   STAT BANNER — horizontal key metrics strip
   ══════════════════════════════════════════════════════════════ */
.stat-banner {
  background: var(--ink);
  color: #fff;
  padding: var(--sp-16) 0;
}
.stat-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: var(--sp-8);
}
.stat-item { text-align: center; padding: var(--sp-4); }
.stat-number {
  font-family: var(--display);
  font-size: clamp(34px, 4vw, 48px);
  font-weight: 400;
  color: var(--sand);
  line-height: 1;
  margin-bottom: var(--sp-2);
}
.stat-unit {
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.4);
  margin-bottom: var(--sp-3);
}
.stat-desc {
  font-family: var(--sans);
  font-size: 12px;
  color: rgba(255,255,255,0.55);
  line-height: 1.45;
}

/* ══════════════════════════════════════════════════════════════
   EXHIBITS — chart/data containers
   Following Deloitte's "figure container" pattern:
   thin top accent, clear label hierarchy, source attribution
   ══════════════════════════════════════════════════════════════ */
.exhibit {
  background: var(--paper);
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: var(--sp-10);
  margin: var(--sp-10) 0;
  position: relative;
}
.exhibit::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--terra);
  border-radius: 2px 2px 0 0;
}
.exhibit-label {
  font-family: var(--sans);
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--terra);
  font-weight: 600;
  margin-bottom: var(--sp-1);
}
.exhibit-title {
  font-family: var(--display);
  font-size: 20px;
  font-weight: 400;
  color: var(--ink);
  margin-bottom: var(--sp-1);
}
.exhibit-subtitle {
  font-family: var(--sans);
  font-size: 12px;
  color: var(--clay);
  margin-bottom: var(--sp-8);
}
.exhibit-source {
  font-family: var(--sans);
  font-size: 10px;
  color: var(--clay);
  margin-top: var(--sp-5);
  padding-top: var(--sp-3);
  border-top: 1px solid var(--border);
}

/* ── Bar Chart ──────────────────────────────────────────────── */
.bar-chart { display: flex; flex-direction: column; gap: var(--sp-3); }
.bar-row {
  display: grid;
  grid-template-columns: 130px 1fr 50px;
  align-items: center;
  gap: var(--sp-4);
}
.bar-label {
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 500;
  color: var(--espresso);
  text-align: right;
}
.bar-track {
  background: var(--wash);
  height: 24px;
  border-radius: 2px;
  overflow: hidden;
}
.bar-fill { height: 100%; border-radius: 2px; }
/* Five chart colors from the warm palette */
.bar-fill.c-1 { background: var(--terra); }
.bar-fill.c-2 { background: var(--ink); }
.bar-fill.c-3 { background: var(--copper); }
.bar-fill.c-4 { background: var(--sage); }
.bar-fill.c-5 { background: var(--clay); }
.bar-value {
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 600;
  color: var(--espresso);
}

/* ── Timeline ───────────────────────────────────────────────── */
.timeline { position: relative; padding-left: 36px; }
.timeline::before {
  content: '';
  position: absolute;
  left: 11px; top: 6px; bottom: 6px;
  width: 1.5px;
  background: linear-gradient(to bottom, var(--terra), var(--sand));
}
.timeline-item {
  position: relative;
  margin-bottom: var(--sp-8);
  padding-left: var(--sp-6);
}
.timeline-item::before {
  content: '';
  position: absolute;
  left: -30px; top: 7px;
  width: 9px; height: 9px;
  border-radius: 50%;
  background: var(--terra);
  border: 2px solid var(--surface);
  box-shadow: 0 0 0 1.5px var(--terra);
}
.timeline-date {
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--terra);
  margin-bottom: 2px;
}
.timeline-title {
  font-family: var(--sans);
  font-size: 15px;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 2px;
}
.timeline-desc {
  font-family: var(--text);
  font-size: 14px;
  color: var(--body-color);
  line-height: 1.65;
}

/* ══════════════════════════════════════════════════════════════
   DONUT CHART
   ══════════════════════════════════════════════════════════════ */
.donut-section {
  display: flex;
  gap: var(--sp-12);
  align-items: center;
  flex-wrap: wrap;
}
.donut {
  width: 196px; height: 196px;
  border-radius: 50%;
  position: relative;
  flex-shrink: 0;
}
.donut::after {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 108px; height: 108px;
  background: var(--paper);
  border-radius: 50%;
}
.donut-legend {
  display: flex;
  flex-direction: column;
  gap: var(--sp-3);
  flex: 1;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  font-family: var(--sans);
  font-size: 13px;
  color: var(--body-color);
}
.legend-swatch {
  width: 10px; height: 10px;
  border-radius: 2px;
  flex-shrink: 0;
}
.legend-pct {
  font-weight: 600;
  min-width: 36px;
  color: var(--espresso);
}

/* ══════════════════════════════════════════════════════════════
   DATA TABLES
   ══════════════════════════════════════════════════════════════ */
.data-table {
  width: 100%;
  border-collapse: collapse;
  font-family: var(--sans);
  font-size: 13px;
}
.data-table thead { background: var(--ink); color: #fff; }
.data-table th {
  padding: var(--sp-3) var(--sp-5);
  text-align: left;
  font-weight: 600;
  font-size: 11px;
  letter-spacing: 0.8px;
  text-transform: uppercase;
}
.data-table td {
  padding: var(--sp-3) var(--sp-5);
  border-bottom: 1px solid var(--border);
}
.data-table tbody tr:nth-child(even) { background: rgba(243,237,231,0.5); }
.heat-high { background: var(--heat-high) !important; font-weight: 600; }
.heat-med  { background: var(--heat-med) !important; }
.heat-low  { background: var(--heat-low) !important; }

/* ══════════════════════════════════════════════════════════════
   INSIGHT CARDS — numbered insight boxes (typically 3)
   ══════════════════════════════════════════════════════════════ */
.insight-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: var(--sp-6);
  margin-top: var(--sp-10);
}
.insight-card {
  background: var(--paper);
  padding: var(--sp-8) var(--sp-6);
  border: 1px solid var(--border);
  border-top: 3px solid var(--terra);
  border-radius: 0 0 2px 2px;
}
.insight-number {
  font-family: var(--display);
  font-size: 42px;
  font-weight: 400;
  color: var(--terra);
  line-height: 1;
  margin-bottom: var(--sp-4);
  opacity: 0.2;
}
.insight-title {
  font-family: var(--sans);
  font-size: 15px;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: var(--sp-2);
  line-height: 1.3;
}
.insight-text {
  font-size: 14px;
  line-height: 1.7;
  color: var(--body-color);
}

/* ══════════════════════════════════════════════════════════════
   PULL QUOTE
   ══════════════════════════════════════════════════════════════ */
.pull-quote {
  background: var(--wash);
  padding: var(--sp-12) var(--sp-16);
  margin: var(--sp-12) 0;
  border-left: 3px solid var(--sand);
  position: relative;
}
.pull-quote blockquote {
  font-family: var(--display);
  font-size: clamp(20px, 2.5vw, 26px);
  font-weight: 400;
  font-style: italic;
  line-height: 1.48;
  color: var(--ink);
  margin-bottom: var(--sp-4);
}
.pull-quote cite {
  font-family: var(--sans);
  font-size: 13px;
  font-style: normal;
  color: var(--clay);
  font-weight: 500;
}

/* ══════════════════════════════════════════════════════════════
   TWO-COLUMN TEXT
   ══════════════════════════════════════════════════════════════ */
.two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--sp-12);
  margin: var(--sp-10) 0;
}
.two-col p {
  font-size: 15px;
  line-height: 1.78;
  margin-bottom: var(--sp-4);
}

/* ══════════════════════════════════════════════════════════════
   IMPLICATIONS / TAKEAWAY GRID — 2×2 card grid
   ══════════════════════════════════════════════════════════════ */
.implications-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: var(--sp-5);
  margin-top: var(--sp-10);
}
.impl-card {
  background: var(--paper);
  border: 1px solid var(--border);
  padding: var(--sp-6);
  position: relative;
  overflow: hidden;
  border-radius: 2px;
}
.impl-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 3px; height: 100%;
}
.impl-card:nth-child(1)::before { background: var(--terra); }
.impl-card:nth-child(2)::before { background: var(--ink); }
.impl-card:nth-child(3)::before { background: var(--copper); }
.impl-card:nth-child(4)::before { background: var(--sage); }
.impl-icon { font-size: 24px; margin-bottom: var(--sp-2); }
.impl-title {
  font-family: var(--sans);
  font-size: 15px;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: var(--sp-2);
}
.impl-text {
  font-size: 14px;
  line-height: 1.7;
  color: var(--body-color);
}

/* ══════════════════════════════════════════════════════════════
   CALLOUT BOX
   ══════════════════════════════════════════════════════════════ */
.callout {
  background: var(--wash);
  border-left: 3px solid var(--terra);
  padding: var(--sp-6) var(--sp-8);
  margin: var(--sp-8) 0;
  font-family: var(--sans);
  font-size: 14px;
  line-height: 1.7;
  border-radius: 0 2px 2px 0;
}
.callout strong { color: var(--ink); }

/* ══════════════════════════════════════════════════════════════
   SEPARATOR — diamond divider between major sections
   ══════════════════════════════════════════════════════════════ */
.separator {
  text-align: center;
  font-size: 14px;
  color: var(--clay);
  letter-spacing: 10px;
  background: var(--wash);
  padding: var(--sp-5) 0;
}

/* ══════════════════════════════════════════════════════════════
   PAGE NUMBERS — CSS counter for printed pages
   ══════════════════════════════════════════════════════════════ */
@page {
  margin: 0.6in 0.7in 0.8in 0.7in;
  @bottom-right {
    content: counter(page);
    font-family: var(--sans);
    font-size: 9px;
    color: var(--clay);
  }
}

/* ══════════════════════════════════════════════════════════════
   TABLE OF CONTENTS
   ══════════════════════════════════════════════════════════════ */
.toc {
  padding: var(--sp-12) 0;
}
.toc-title {
  font-family: var(--display);
  font-size: 28px;
  font-weight: 400;
  color: var(--ink);
  margin-bottom: var(--sp-8);
}
.toc-list {
  list-style: none;
}
.toc-item {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: var(--sp-3) 0;
  border-bottom: 1px solid var(--border);
  font-family: var(--sans);
  font-size: 14px;
  color: var(--body-color);
}
.toc-item:last-child { border-bottom: none; }
.toc-chapter {
  font-weight: 600;
  color: var(--ink);
}
.toc-page {
  font-weight: 500;
  color: var(--clay);
  flex-shrink: 0;
  margin-left: var(--sp-4);
}
.toc-dots {
  flex: 1;
  border-bottom: 1px dotted var(--border);
  margin: 0 var(--sp-3);
  min-width: 20px;
}

/* ══════════════════════════════════════════════════════════════
   SIDEBAR / CASE STUDY BOX
   ══════════════════════════════════════════════════════════════ */
.sidebar {
  background: var(--wash);
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: var(--sp-6) var(--sp-8);
  margin: var(--sp-8) 0;
}
.sidebar-label {
  font-family: var(--sans);
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--terra);
  font-weight: 600;
  margin-bottom: var(--sp-2);
}
.sidebar-title {
  font-family: var(--sans);
  font-size: 16px;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: var(--sp-3);
}
.sidebar p {
  font-size: 14px;
  line-height: 1.7;
  color: var(--body-color);
  margin-bottom: var(--sp-3);
}
.sidebar p:last-child { margin-bottom: 0; }

/* ══════════════════════════════════════════════════════════════
   FOOTNOTES
   ══════════════════════════════════════════════════════════════ */
.footnotes {
  margin-top: var(--sp-10);
  padding-top: var(--sp-5);
  border-top: 1px solid var(--border);
}
.footnotes p {
  font-family: var(--sans);
  font-size: 11px;
  color: var(--clay);
  line-height: 1.6;
  margin-bottom: var(--sp-2);
}
.fn-ref {
  font-size: 0.75em;
  vertical-align: super;
  color: var(--terra);
  font-weight: 600;
}

/* ══════════════════════════════════════════════════════════════
   FOOTER
   ══════════════════════════════════════════════════════════════ */
footer {
  background: var(--ink);
  color: #fff;
  padding: var(--sp-12) 0 var(--sp-8);
}
footer p {
  font-family: var(--sans);
  font-size: 12px;
  color: rgba(255,255,255,0.4);
  line-height: 1.65;
  max-width: 540px;
  margin-bottom: var(--sp-4);
}
.footer-bottom {
  border-top: 1px solid rgba(255,255,255,0.07);
  padding-top: var(--sp-5);
  font-family: var(--sans);
  font-size: 11px;
  color: rgba(255,255,255,0.2);
  display: flex;
  justify-content: space-between;
  letter-spacing: 0.3px;
  flex-wrap: wrap;
  gap: var(--sp-2);
}

/* ══════════════════════════════════════════════════════════════
   RESPONSIVE — graceful collapse for narrow viewports
   ══════════════════════════════════════════════════════════════ */
@media (max-width: 860px) {
  .stat-grid { grid-template-columns: repeat(2, 1fr); }
  .insight-grid, .two-col, .implications-grid { grid-template-columns: 1fr; }
  .bar-row { grid-template-columns: 100px 1fr 48px; }
  .pull-quote { padding: var(--sp-8); }
  .donut-section { flex-direction: column; align-items: flex-start; }
  .hero { padding: var(--sp-16) 0 var(--sp-12); }
}
@media (max-width: 560px) {
  .stat-grid { grid-template-columns: 1fr; }
  .container, .hero-inner { padding: 0 var(--sp-5); }
  section { padding: var(--sp-12) 0; }
  .exhibit { padding: var(--sp-5); }
}

/* ══════════════════════════════════════════════════════════════
   PRINT / PDF — critical for Chromium headless rendering
   ══════════════════════════════════════════════════════════════ */
@media print {
  body {
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
  }
  .hero, .stat-banner, .separator, footer,
  .exhibit::before, .insight-card, .impl-card::before,
  .cover-full, .cover-full .cover-overlay,
  .section-hero, .section-hero .section-hero-overlay {
    -webkit-print-color-adjust: exact !important;
  }
  .top-bar { position: relative !important; }

  /* Cover gets its own page */
  .cover-full { page-break-after: always; }
  /* Section hero images start a new page */
  .section-hero { page-break-before: always; page-break-after: avoid; }
  /* Keep stat banner together */
  .stat-banner { page-break-inside: avoid; break-inside: avoid; }

  /* CRITICAL: section headers must stay with following content */
  .section-label { page-break-after: avoid; break-after: avoid; }
  .section-title { page-break-after: avoid; break-after: avoid; }
  .section-intro { page-break-after: avoid; break-after: avoid; }
  h2, h3 { page-break-after: avoid; break-after: avoid; }

  /* Exhibits CAN break between rows — individual components stay together */
  .exhibit { break-inside: auto; }
  .exhibit-label, .exhibit-title, .exhibit-subtitle { page-break-after: avoid; break-after: avoid; }
  .exhibit-source { page-break-before: avoid; break-before: avoid; }

  /* Timeline: allow breaks BETWEEN items, never WITHIN */
  .timeline { break-inside: auto; }
  .timeline-item { page-break-inside: avoid; break-inside: avoid; }

  /* Cards: keep each card together, grid can break between cards */
  .insight-grid { break-inside: auto; }
  .insight-card { page-break-inside: avoid; break-inside: avoid; }
  .implications-grid { break-inside: auto; }
  .impl-card { page-break-inside: avoid; break-inside: avoid; }

  /* These must never split */
  .pull-quote { page-break-inside: avoid; break-inside: avoid; }
  .callout { page-break-inside: avoid; break-inside: avoid; }
  .sidebar { page-break-inside: avoid; break-inside: avoid; }

  /* Two-col: allow breaks between columns, not within */
  .two-col { break-inside: auto; }
  .two-col > div { page-break-inside: avoid; break-inside: avoid; }

  /* Tables: keep header, allow breaks between rows */
  .data-table { break-inside: auto; }
  .data-table thead { display: table-header-group; }
  .data-table tr { page-break-inside: avoid; break-inside: avoid; }

  /* Footer */
  footer { page-break-inside: avoid; break-inside: avoid; }

  .bar-fill { transition: none !important; }
}
